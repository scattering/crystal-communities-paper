name: crystal-communities
# Pinned environment for the Nature manuscript "Computational materials
# proposals depart from the structural memory of experimental discovery."
# Versions match the production TACC Stampede3 environment that produced
# every figure and SI table; reproducibility-bundle figures regenerate
# byte-for-byte (modulo matplotlib font-cache state) with these pins.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate crystal-communities
#
# Heavy artifacts (the 167.5K-row ICSD feature matrix, raw CIFs, etc.)
# are NOT bundled with the code; they live on Zenodo (DOI in the
# manuscript data-availability statement). See README.md for the full
# regeneration recipe.
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Core numerics
  - numpy=2.4.4
  - scipy=1.17.1
  - pandas=2.3.3
  - scikit-learn=1.8.0

  # Plotting
  - matplotlib=3.10.8
  - plotly=6.7.0
  - kaleido=0.2.1

  # Graph + community detection
  - networkx=3.6.1
  - hdbscan=0.8.42

  # Crystallography / featurization
  - pymatgen=2026.3.23

  # Misc utilities
  - tqdm=4.67.3
  - pyyaml=6.0.3
  - requests=2.33.1

  # Pip-installed (not on conda-forge or pinned tighter via pip)
  - pip:
      - python-louvain==0.16
      - matminer==0.10.1
      - mp-api==0.46.0
      - jarvis-tools==2026.4.2
      - emmet-core==0.86.3
      - pymatgen-core==2026.4.16
      # Optional: only needed if you want to regenerate the figure DOCX
      # from the manuscript Markdown via the dockerized pandoc pipeline
      # in paper/scripts/build_manuscript.sh. Not required to run any
      # analysis script.
      - python-docx==1.1.2
